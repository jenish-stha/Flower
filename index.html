    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 50%, #e0f2fe 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
            position: relative;
        }


        /* Floating hearts background */
        .floating-heart {
            position: absolute;
            color: rgba(59, 130, 246, 0.3);
            font-size: 20px;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Floating sparkles background */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 2;
        }

        .sparkle::before {
            content: '✨';
            font-size: 20px;
            animation: sparkleFloat 8s ease-in-out infinite;
        }

        @keyframes sparkleFloat {
            0% {
                transform: translateY(0) translateX(0) scale(0.5);
                opacity: 0;
            }
            25% {
                opacity: 1;
            }
            75% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px) scale(0.8);
                opacity: 0;
            }
        }

        /* Floating bubbles */
        .bubble {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(59, 130, 246, 0.4));
            box-shadow: inset -2px -2px 5px rgba(0, 0, 0, 0.2);
        }

        @keyframes bubbleFloat {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.6;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) scale(0.7);
                opacity: 0;
            }
        }


        /* Flower container */
        .flower-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bloom 1.2s ease-out forwards;
            z-index: 10;
            will-change: transform, opacity;
        }

        @keyframes bloom {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Flower structure */
        .flower {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0 6px 15px rgba(14, 165, 233, 0.3));
            will-change: filter;
        }

        /* Petals with random colors */
        .petal {
            position: absolute;
            width: 30px;
            height: 40px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            top: 20px;
            left: 25px;
            transform-origin: 50% 100%;
            filter: brightness(1.05) saturate(1.1);
        }

        .petal:nth-child(1) { transform: rotate(0deg); }
        .petal:nth-child(2) { transform: rotate(60deg); }
        .petal:nth-child(3) { transform: rotate(120deg); }
        .petal:nth-child(4) { transform: rotate(180deg); }
        .petal:nth-child(5) { transform: rotate(240deg); }
        .petal:nth-child(6) { transform: rotate(300deg); }

        /* Flower center */
        .center {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #ffff80, #ffd700, #ff9500);
            border-radius: 50%;
            top: 30px;
            left: 30px;
            z-index: 2;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
        }

        /* Stem */
        .stem {
            position: absolute;
            width: 4px;
            height: 60px;
            background: linear-gradient(to bottom, #228b22, #32cd32);
            bottom: -60px;
            left: 38px;
            border-radius: 2px;
        }

        /* Leaves */
        .leaf {
            position: absolute;
            width: 15px;
            height: 8px;
            background: linear-gradient(45deg, #228b22, #32cd32);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            bottom: -30px;
            left: 35px;
            transform: rotate(-30deg);
        }

        .leaf:nth-child(2) {
            left: 25px;
            transform: rotate(30deg);
        }

        /* Message */
        .message {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(240, 249, 255, 0.95));
            padding: 10px 16px;
            border-radius: 25px;
            font-size: 14px;
            color: #0369a1;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(14, 165, 233, 0.3), 0 0 15px rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
            animation: messageFade 2s ease-out forwards;
            z-index: 15;
            backdrop-filter: blur(10px);
        }

        @keyframes messageFade {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Welcome message */
        .welcome {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(240, 249, 255, 0.98));
            padding: 40px 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(14, 165, 233, 0.25), 0 0 30px rgba(59, 130, 246, 0.15);
            border: 2px solid rgba(59, 130, 246, 0.3);
            z-index: 100;
            animation: welcomeFade 3s ease-out forwards;
            backdrop-filter: blur(20px);
            max-height: 90vh;
            overflow-y: auto;
            max-width: 90vw;
        }

        @keyframes welcomeFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
                pointer-events: none;
            }
        }

        .welcome h1 {
            color: #0369a1;
            font-size: 2.8em;
            margin-bottom: 10px;
            font-family: 'Brush Script MT', cursive;
            text-shadow: 0 4px 8px rgba(3, 105, 161, 0.2);
            animation: titleBounce 3s ease-in-out infinite;
        }

        @keyframes titleBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-3px);
            }
        }

        .welcome p {
            color: #334155;
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .welcome .instruction {
            color: #0369a1;
            font-weight: bold;
            font-size: 1.1em;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Surprise final message */
        .surprise-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.9), rgba(3, 105, 161, 0.9));
            color: white;
            padding: 40px 60px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(14, 165, 233, 0.4);
            z-index: 200;
            font-family: 'Brush Script MT', cursive;
            font-size: 2.5em;
            font-weight: bold;
            animation: surpriseFade 3s ease-out forwards, surprisePulse 2s ease-in-out infinite 3s;
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes surpriseFade {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes surprisePulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 15px 40px rgba(14, 165, 233, 0.4);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.02);
                box-shadow: 0 20px 50px rgba(14, 165, 233, 0.5);
            }
        }

            { primary: '#0369a1', secondary: '#3b82f6' }, // Deep Blue
            { primary: '#0ea5e9', secondary: '#06b6d4' }, // Cyan Blue
            { primary: '#8b5cf6', secondary: '#6366f1' }, // Purple
            { primary: '#60a5fa', secondary: '#3b82f6' }, // Light Blue
            { primary: '#0284c7', secondary: '#0369a1' }, // Sky Blue
            { primary: '#06b6d4', secondary: '#0891b2' }, // Cyan
            { primary: '#0891b2', secondary: '#0369a1' }, // Teal Blue
            { primary: '#10b981', secondary: '#059669' }, // Emerald Green
            { primary: '#34d399', secondary: '#10b981' }, // Light Green
            { primary: '#fbbf24', secondary: '#f59e0b' }, // Amber
            { primary: '#f97316', secondary: '#ea580c' }, // Orange
            { primary: '#ec4899', secondary: '#db2777' }, // Rose Pink
            { primary: '#f43f5e', secondary: '#be185d' }, // Rose Red
            { primary: '#06b6d4', secondary: '#0891b2' }, // Turquoise
            { primary: '#a855f7', secondary: '#9333ea' }, // Violet
            { primary: '#6366f1', secondary: '#4f46e5' }, // Indigo
            { primary: '#ef4444', secondary: '#dc2626' }, // Red
            { primary: '#fb923c', secondary: '#f97316' }, // Orange Glow
            { primary: '#fbbf24', secondary: '#f59e0b' }, // Golden
            { primary: '#22c55e', secondary: '#16a34a' }, // Green
            { primary: '#14b8a6', secondary: '#0d9488' }  // Teal
        ];

        let flowerCount = 0;
        let musicPlaying = false;
        let surpriseShown = false;
        let messageIndex = 0;

        // Create floating hearts
        function createFloatingHeart() {
            // Limit background hearts to prevent performance issues
            const currentHearts = document.querySelectorAll('.floating-heart').length;
            if (currentHearts > 3) return;
            
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '💕';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 6 + 's';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(heart);
            
            // Remove heart after animation
            setTimeout(() => {
                if (heart.parentNode) {
                    heart.parentNode.removeChild(heart);
                }
            }, 10000);
        }

        // Create floating sparkles
        function createSparkle() {
            // Limit sparkles to prevent performance issues
            const currentSparkles = document.querySelectorAll('.sparkle').length;
            if (currentSparkles > 2) return;
            
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.animationDuration = (Math.random() * 4 + 6) + 's';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                if (sparkle.parentNode) {
                    sparkle.parentNode.removeChild(sparkle);
                }
            }, 12000);
        }

        // Create floating bubbles
        function createBubble() {
            // Limit bubbles to prevent performance issues
            const currentBubbles = document.querySelectorAll('.bubble').length;
            if (currentBubbles > 2) return;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 40 + 20;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.bottom = '-50px';
            bubble.style.animationName = 'bubbleFloat';
            bubble.style.animationDuration = (Math.random() * 6 + 8) + 's';
            bubble.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(bubble);
            
            setTimeout(() => {
                if (bubble.parentNode) {
                    bubble.parentNode.removeChild(bubble);
                }
            }, 15000);
        }

        // Get random petal colors
        function getRandomPetalColors() {
            return petalColors[Math.floor(Math.random() * petalColors.length)];
        }

        // Create a flower
        function createFlower(x, y) {
            flowerCount++;
            document.getElementById('flowerCount').textContent = flowerCount;
            
            const container = document.createElement('div');
            container.className = 'flower-container';
            container.style.left = x + 'px';
            container.style.top = y + 'px';
            
            const flower = document.createElement('div');
            flower.className = 'flower';
            
            // Get random colors for this flower
            const colors = getRandomPetalColors();
            
            // Create petals with random colors
            for (let i = 0; i < 6; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.background = `linear-gradient(45deg, ${colors.primary}, ${colors.secondary})`;
                flower.appendChild(petal);
            }
            
            // Create center
            const center = document.createElement('div');
            center.className = 'center';
            flower.appendChild(center);
            
            // Create stem
            const stem = document.createElement('div');
            stem.className = 'stem';
            flower.appendChild(stem);
            
            // Create leaves
            const leaf1 = document.createElement('div');
            leaf1.className = 'leaf';
            flower.appendChild(leaf1);
            
            const leaf2 = document.createElement('div');
            leaf2.className = 'leaf';
            flower.appendChild(leaf2);
            
            container.appendChild(flower);
            
            // Create message
            const message = document.createElement('div');
            message.className = 'message';
            message.textContent = messages[messageIndex];
            messageIndex = (messageIndex + 1) % messages.length;
            container.appendChild(message);
            
            document.body.appendChild(container);
            
            // Check if we should show surprise message after all messages are shown
            if (flowerCount === messages.length && !surpriseShown) {
                showSurpriseMessage();
            }
        }

        // Show surprise message
        function showSurpriseMessage() {
            surpriseShown = true;
            
            const surprise = document.createElement('div');
            surprise.className = 'surprise-message';
            surprise.textContent = 'This whole garden is for you';
            document.body.appendChild(surprise);
            
            // Add extra floating hearts for celebration
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createFloatingHeart();
                }, i * 200);
            }
        }

        // Handle click events
        document.addEventListener('click', (e) => {
            // Don't create flower if clicking on controls
            if (e.target.closest('.audio-controls') || e.target.closest('.welcome') || e.target.closest('.surprise-message')) {
                return;
            }
            
            createFlower(e.clientX - 40, e.clientY - 40);
        });

        // Toggle background music
        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const btn = document.querySelector('.audio-btn');
            
            if (musicPlaying) {
                audio.pause();
                btn.textContent = '🔇';
                musicPlaying = false;
            } else {
                audio.play().catch(e => {
                    console.log('Audio autoplay blocked by browser');
                    btn.textContent = '🔇';
                });
                btn.textContent = '🎵';
                musicPlaying = true;
            }
        }

        // Initialize floating hearts
        function initFloatingHearts() {
            setInterval(createFloatingHeart, 4000);
            setInterval(createSparkle, 5000);
            setInterval(createBubble, 6000);
        }

        // Create initial flowers on page load
        function createInitialFlowers() {
            setTimeout(() => {
                createFlower(window.innerWidth * 0.2, window.innerHeight * 0.3);
            }, 1000);
            
            setTimeout(() => {
                createFlower(window.innerWidth * 0.5, window.innerHeight * 0.6);
            }, 2000);
            
            setTimeout(() => {
                createFlower(window.innerWidth * 0.8, window.innerHeight * 0.4);
            }, 3000);
        }

        // Track device login
        function trackDeviceLogin() {
            const userAgent = navigator.userAgent;
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const screenResolution = window.devicePixelRatio || 1;
            
            // Detect device type
            let deviceType = 'Desktop';
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent)) {
                deviceType = 'Mobile';
            } else if (/tablet|iPad/i.test(userAgent)) {
                deviceType = 'Tablet';
            } else if (/Windows|Macintosh|Linux/.test(userAgent)) {
                deviceType = 'Desktop';
            }

            // Detect device name from userAgent
            let deviceName = 'Unknown Device';
            if (/iPhone/.test(userAgent)) deviceName = 'iPhone';
            else if (/iPad/.test(userAgent)) deviceName = 'iPad';
            else if (/Android/.test(userAgent)) {
                if (/Pixel/.test(userAgent)) deviceName = 'Google Pixel';
                else if (/Samsung/.test(userAgent)) deviceName = 'Samsung Android';
                else deviceName = 'Android Phone';
            } else if (/Windows/.test(userAgent)) deviceName = 'Windows PC';
            else if (/Mac/.test(userAgent)) deviceName = 'Mac';
            else if (/Linux/.test(userAgent)) deviceName = 'Linux PC';

            const loginData = {
                deviceType: deviceType,
                deviceName: deviceName,
                userAgent: userAgent,
                screenWidth: screenWidth,
                screenHeight: screenHeight,
                screenResolution: `${screenWidth}x${screenHeight}`,
                timestamp: new Date().toISOString()
            };

            // Store in localStorage (always)
            const logins = JSON.parse(localStorage.getItem('deviceLogins') || '[]');
            logins.push(loginData);
            localStorage.setItem('deviceLogins', JSON.stringify(logins));
            
            // Sync to custom database API (works across all devices!)
            sendToAPI(loginData);
            
            console.log('Device login tracked:', loginData);
        }

        // Send login to custom API
        async function sendToAPI(loginData) {
            try {
                console.log('Sending to API:', API_URL, loginData);
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                if (!response.ok) {
                    console.warn(`⚠️ API responded with status ${response.status}`);
                    return;
                }

                const result = await response.json();
                if (result.success) {
                    console.log('✅ Synced to custom database');
                } else {
                    console.warn('⚠️ API error:', result.error);
                }
            } catch (error) {
                console.warn('API connection error:', error.message);
                console.warn('Device login will be stored locally and synced when API is available');
            }
        }

        // Initialize everything when page loads
        window.addEventListener('load', () => {
            trackDeviceLogin();
            initFloatingHearts();
            
            // Try to start music automatically
            setTimeout(() => {
                const audio = document.getElementById('bgMusic');
                audio.play().then(() => {
                    musicPlaying = true;
                    document.querySelector('.audio-btn').textContent = '🎵';
                }).catch(e => {
                    console.log('Audio autoplay blocked by browser');
                });
            }, 1000);
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            // Adjust flower positions if needed
            const flowers = document.querySelectorAll('.flower-container');
            flowers.forEach(flower => {
                const x = parseInt(flower.style.left);
                const y = parseInt(flower.style.top);
                
                if (x > window.innerWidth - 100) {
                    flower.style.left = (window.innerWidth - 100) + 'px';
                }
                if (y > window.innerHeight - 150) {
                    flower.style.top = (window.innerHeight - 150) + 'px';
                }
            });
        });
    </script>
</body>
